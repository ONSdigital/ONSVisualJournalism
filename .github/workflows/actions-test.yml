name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libuv1-dev


      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("jsonlite", "curl", "dplyr", "glue", "stringr", "DT", "rmarkdown", "knitr", "readr", "lubridate", "tidyr"), repos="https://cloud.r-project.org")'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Run carousel generation script
        run: |
          Rscript scripts/cotm_carousel.R

      - name: Render site
        run: |
          quarto render

      - name: Deploy to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
